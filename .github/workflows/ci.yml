name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy memem

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest
        run: pytest -v

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build wheel + sdist
        run: python -m build
      - name: Install wheel in a clean venv
        run: |
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install --upgrade pip
          /tmp/wheel-venv/bin/pip install dist/*.whl
      - name: Smoke-test the installed wheel
        run: |
          /tmp/wheel-venv/bin/python -m memem.server --rebuild-index
          /tmp/wheel-venv/bin/python -c "import memem; print(memem.__version__)"
      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
